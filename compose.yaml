services:
  bot:
    build:
      context: .
      dockerfile: Containerfile
    env_file: .env
    volumes:
      - adaptive-bybit-data:/data
    command: ["run", "--symbols", "BTCUSDT,ETHUSDT"]

  api:
    build:
      context: .
      dockerfile: Containerfile
    env_file: .env
    volumes:
      - adaptive-bybit-data:/data
    command: ["api", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"

volumes:
  adaptive-bybit-data:
