# Project-local Codex configuration for adaptive-bybit-signal-bot.
# This file intentionally configures this repository only; it does not modify
# ~/.codex/config.toml.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

persistent_instructions = "Follow AGENTS.md. Preserve the read-only/order-intent Bybit safety boundary. Do not inspect or expose .env."

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 30

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
startup_timeout_sec = 30

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 30

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"
#command = "npx"
#args = ["-y", "mcp-remote", "https://mcp.exa.ai/mcp"]
#startup_timeout_sec = 30

# Playwright is intentionally not enabled by default: this repo has no browser UI.
# Uncomment only if a browser-facing dashboard is added later.
# [mcp_servers.playwright]
# command = "npx"
# args = ["-y", "@playwright/mcp@latest", "--extension"]
# startup_timeout_sec = 30

[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for evidence gathering before changes."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Correctness, safety, security, and missing-test reviewer."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Primary-source documentation verifier for Python/FastAPI/SQLAlchemy/Codex behavior."
config_file = "agents/docs-researcher.toml"
