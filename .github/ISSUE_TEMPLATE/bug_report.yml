name: Bug report
description: Report a reproducible problem in the bot, API, runtime, or documentation.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include `.env`, API keys, account identifiers, or real secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, inputs, and expected versus actual behavior.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - API
        - Strategy
        - Persistence
        - Bybit read-only exchange adapter
        - Paper/backtest/replay
        - Podman/compose
        - Documentation/OpenSpec
        - Other
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include secrets, `.env` values, or private account data.
          required: true
