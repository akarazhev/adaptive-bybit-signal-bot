name: Feature request
description: Propose a change while preserving the read-only/order-intent safety boundary.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        For behavior, API, persistence, runtime, deployment, or safety changes,
        expect an OpenSpec proposal before implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What should improve and why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the user-visible behavior or operational outcome.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Safety boundaries
      options:
        - label: This does not require direct Bybit order placement, cancellation, amendment, transfer, withdrawal, or leverage execution.
          required: true
        - label: This can be planned with OpenSpec before implementation.
          required: true
