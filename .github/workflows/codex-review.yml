name: Codex review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: codex-review-${{ github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  codex:
    name: Run Codex review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.inputs.pr_number }}/merge
          persist-credentials: false

      - name: Fetch pull request refs
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          git fetch --no-tags origin \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/origin/pr/$PR_NUMBER/head"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-review.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Upload Codex review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-review-${{ github.event.inputs.pr_number }}
          path: codex-review.md
          if-no-files-found: ignore

  post_feedback:
    name: Post Codex review
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.CODEX_FINAL_MESSAGE,
            });
