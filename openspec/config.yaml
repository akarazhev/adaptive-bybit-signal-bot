schema: spec-driven

context: |
  Project: adaptive-bybit-signal-bot v0.6.0.

  Purpose:
  - Python 3.14 read-only/order-intent bot for Bybit Spot BTC/ETH.
  - The system reads public/read-only market data, computes regimes/signals,
    writes local order intents, and supports paper/backtest/replay workflows.
  - The system is not a live exchange executor and must not become one through
    ordinary feature work.

  Non-negotiable safety boundary:
  - Do not add direct Bybit order placement, cancellation, amendment, transfer,
    withdrawal, leverage, margin, or execution APIs.
  - Forbidden execution method names include place_order, cancel_order,
    amend_order, create_order, submit_order, withdraw, transfer, and set_leverage.
  - BybitRestClient must remain public/read-only except for already-present
    signed read-only validation/account sync flows.
  - Local order intents, paper fills, backtest fills, and replay fills are the
    permitted action records.
  - BYBIT_ALLOW_READ_WRITE_KEY must default to false. Changing that default or
    documenting read-write keys as normal operation requires explicit security
    review and user approval.

  Stack:
  - Python package under src/adaptive_bybit_bot.
  - Typer CLI entrypoint: adaptive-bybit-bot.
  - FastAPI read-only API under src/adaptive_bybit_bot/api.
  - SQLAlchemy persistence with SQLite standalone mode and PostgreSQL compose
    mode.
  - Pydantic Settings from .env; never inspect, print, or commit local .env.
  - Podman deployment via Containerfile, compose.yaml, compose.rest.yaml, and
    compose.recorder.yaml.
  - GitHub configuration under .github/ provides CI, CodeQL, Dependabot,
    issue/PR templates, CODEOWNERS, SECURITY.md, and manual Codex PR review.
  - Tests use pytest; quality gates are compileall, ruff, and strict mypy.

  Architecture boundaries:
  - exchange/ isolates Bybit REST/WS adapters.
  - features/, strategy/, and sentiment/ stay calculation-oriented.
  - data/repositories.py owns persistence workflows.
  - services/ owns runtime orchestration, loops, heartbeats, and locks.
  - api/ remains read-only presentation.
  - recording/ and replay are opt-in/high-volume workflows and must not become
    default-on in compose.

  Production readiness posture:
  - Spec-Driven Development is mandatory for production-facing work. In this
    repository, SDD means OpenSpec-first development for changes that affect
    behavior, persistence, API, runtime, deployment, safety, or repository
    governance.
  - SDD-scoped feature and production-facing work should have a GitHub issue or
    explicit issue draft before implementation. The issue is the human context
    and project-evolution record; OpenSpec remains the technical contract.
  - Creating or updating a remote GitHub issue is an external write action and
    requires explicit user approval. Without approval, prepare the issue body as
    a local draft or handoff artifact.
  - SDD-scoped work must update or create proposal/design/task artifacts before
    implementation, then proceed through failing tests, implementation,
    refactor, verification, and any required doc/spec updates.
  - Favor measurable strategy quality over adding indicators for their own sake.
  - Preserve SQLite standalone and PostgreSQL compose modes.
  - Keep public-network access out of ordinary unit tests. Use mocks, fixtures,
    or explicit integration gates.
  - Deployment changes must consider health checks, restart behavior, resource
    usage, logs, rollback, and recorder storage growth.
  - GitHub Actions must remain least-privilege and must not expose secrets to
    untrusted pull request contexts.
  - Codex review automation should run from trusted maintainer action or Codex
    cloud settings, and should use AGENTS.md Review Guidelines.
  - New persistent schema/data-store behavior needs migration and rollback
    reasoning even when implemented through SQLAlchemy metadata rather than
    Alembic.

rules:
  proposal:
    - Treat behavior, persistence, API, runtime, deployment, safety, and repository-governance changes as SDD-scoped work that requires OpenSpec before implementation.
    - For SDD-scoped feature and production-facing work, link an existing GitHub issue or prepare an issue draft before implementation.
    - The issue or draft must record human-readable context, goal, non-goals, safety invariants, acceptance criteria, and links to the OpenSpec change and PR when available.
    - Do not create or update remote GitHub issues from an agent without explicit user approval; draft locally when approval is absent.
    - State whether the change touches exchange adapters, signing, account sync, order intents, paper trading, persistence, API, compose, recorder/replay, or secrets.
    - Include an explicit "Safety boundary" note for any trading-adjacent change, even when the expected answer is "read-only/order-intent only".
    - Identify user-visible behavior, operational impact, and production rollback considerations.
    - Keep new API proposals GET/read-only unless the user explicitly requests a write endpoint and security review is part of scope.
    - Do not propose live Bybit execution as an in-repo capability.
  specs:
    - Requirements must use SHALL or MUST and describe observable product, safety, or operational behavior.
    - Include scenarios for read-only/order-intent safety when behavior touches exchange, credentials, account sync, or order-intent records.
    - Include scenarios for SQLite standalone and PostgreSQL compose behavior when persistence changes.
    - Include scenarios for recorder opt-in behavior when recording/replay changes.
    - Do not encode implementation-only details as product requirements unless they are part of the safety or production contract.
  design:
    - Explain how the design preserves the no-exchange-execution invariant.
    - Document validation at system boundaries, secret handling, failure modes, and rollback for security-sensitive or deployment changes.
    - For persistence changes, describe schema compatibility, data backfill needs, and rollback behavior.
    - For runtime/compose changes, document health, restart policy, resource/storage implications, and operator commands.
    - For GitHub Actions or Codex automation changes, document trigger safety, token permissions, required secrets, and fork/PR behavior.
    - Prefer existing module boundaries and repository/service abstractions over new cross-cutting shortcuts.
  tasks:
    - Include failing tests before behavior changes, then implementation, then refactor/cleanup.
    - Include GitHub issue linkage for SDD-scoped work, PR/OpenSpec cross-links, and any required issue history updates.
    - Include PYTHONPATH=src pytest, python -m compileall -q src tests, ruff check ., and mypy src as handoff checks unless explicitly out of scope.
    - Add podman build -t adaptive-bybit-signal-bot -f Containerfile . and podman compose config when deployment files change.
    - Add GitHub workflow validation, least-privilege permission review, and secret exposure review when .github workflows change.
    - Add doc/spec updates when architecture, safety guarantees, runbooks, compose topology, or roadmap behavior changes.
    - Include a security-review task for credentials, account sync, API endpoints, Bybit adapter changes, or any trading-adjacent write behavior.
